project:
  type: seedcase-theme
  render:
    # Ignore this folder, it is the Rust build folder.
    - "!target/"

website:
  title: "Seedcase Propagate"
  site-url: "https://propagate.seedcase-project.org"
  repo-url: "https://github.com/seedcase-project/seedcase-propagate"
  page-navigation: true
  navbar:
    pinned: true
    title: false
    favicon: "_extensions/seedcase-project/seedcase-theme/logos/propagate/icon.svg"
    logo: "_extensions/seedcase-project/seedcase-theme/logos/propagate/navbar.svg"
    logo-alt: "seedcase-propagate logo: Main page"
    left:
      - text: "Overview"
        href: docs/index.qmd
      - text: "Guide"
        href: docs/guide/index.qmd
      - text: "Design"
        href: docs/design/index.qmd
      # - text: "Reference"
      #   href: docs/reference/index.qmd
    tools:
      - icon: github
        href: "https://github.com/seedcase-project/seedcase-propagate"
        aria-label: "GitHub icon: Source code"
      - icon: house
        href: "https://seedcase-project.org"
        aria-label: "House icon: Main website for the Seedcase Project"
  sidebar:
    - id: overview
      pinned: true
      style: "floating"
      contents:
        - docs/index.qmd
        - CHANGELOG.md
        - CONTRIBUTING.md
    - id: design
      contents:
        - text: "Design"
          href: docs/design/index.qmd
        - text: "Architecture"
          href: docs/design/architecture.qmd
        - section: "Interface"
          href: docs/design/interface/index.qmd
          contents:
            - docs/design/interface/inputs.qmd
            - docs/design/interface/outputs.qmd
            - docs/design/interface/request.qmd
            - docs/design/interface/cli.qmd
            - docs/design/interface/web.qmd
            - docs/design/interface/rust.qmd
    - id: guide
      contents:
        - section: "Guide"
          href: docs/guide/index.qmd

format:
  seedcase-theme-html:
    include-before-body:
      - "docs/includes/site-counter.html"
